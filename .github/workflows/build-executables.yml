name: Build executables

# Manual trigger only — run this when you've accumulated enough updates to cut a
# new standalone build. GitHub -> Actions -> "Build executables" -> Run workflow.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label shown in the release name (e.g. 0.2.0)"
        required: false
        default: "0.1.0"

permissions:
  contents: write # required for the release job to publish

jobs:
  build-macos:
    # Build both Mac architectures in parallel:
    #   macos-15-intel -> Intel (x86_64): runs on Intel Macs (and on Apple Silicon via Rosetta).
    #     NOTE: macos-13 (the old Intel image) was RETIRED by GitHub in Dec 2025 and now just
    #     hangs in "queued" forever. macos-15-intel is its replacement and the LAST Intel image
    #     GitHub will offer — all x86_64 macOS runners are removed in Fall 2027.
    #   macos-14 -> Apple Silicon (arm64): runs natively on M-series Macs.
    # An arm64 build will NOT run on Intel, so we ship one zip per architecture.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: intel
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[build]"
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm sciim_toolkit.spec
      - name: Zip .app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "SciIm Toolkit.app" "../sciim-toolkit-macos-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: sciim-toolkit-macos-${{ matrix.arch }}
          path: sciim-toolkit-macos-${{ matrix.arch }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[build]"
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm sciim_toolkit.spec
      - name: Zip build folder
        shell: pwsh
        # Zip the folder itself so colleagues unzip a tidy "SciIm Toolkit\" directory.
        run: Compress-Archive -Path "dist/SciIm Toolkit" -DestinationPath "sciim-toolkit-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: sciim-toolkit-windows
          path: sciim-toolkit-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # Tag uses the run number so every manual build gets its own release with no
        # tag collisions and no manual version bumping. Marked prerelease since the
        # builds are unsigned. The glob attaches all three zips (mac intel + mac arm64
        # + windows), each downloaded into its own artifacts/<name>/ subdirectory.
        run: |
          gh release create "build-${{ github.run_number }}" \
            --repo "${{ github.repository }}" \
            --title "SciIm Toolkit ${{ inputs.version }} (build ${{ github.run_number }})" \
            --notes "Standalone unsigned builds. macOS: choose -arm64 for Apple Silicon (M1/M2/M3/M4) or -intel for Intel Macs (Apple menu -> About This Mac to check). First-launch steps in docs/BUILDING.md — macOS: right-click the app -> Open; Windows: More info -> Run anyway. Copy the zip off the shared drive and unzip locally before running." \
            --prerelease \
            artifacts/*/*.zip
